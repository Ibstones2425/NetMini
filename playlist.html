<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NetMini — Saved</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#141414">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NetMini">
  <link rel="icon" type="image/png" href="favicon-32.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/playlist.css">
  <script src="js/splash.js" defer></script>
  <script src="js/pwa.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>

    <main class="main-content">
      <div class="mobile-wordmark">net<span>Mini</span></div>

      <div class="page-inner">
        <header class="playlist-header">
          <h1>My Playlist</h1>
          <p class="playlist-subtitle" id="playlist-count"></p>
        </header>

        <div class="poster-grid" id="playlist-grid"></div>
      </div>
    </main>
  </div>

  <nav id="bottom-bar" class="bottom-bar"></nav>

  <div id="toast"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/components.js"></script>
  <script src="js/playlist.js"></script>
</body>
</html>
