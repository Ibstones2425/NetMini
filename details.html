<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>NetMini — Details</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#141414">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NetMini">
  <link rel="icon" type="image/png" href="favicon-32.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/playlink-guide.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/details.css">
  <script src="js/splash.js" defer></script>
  <script src="js/playlink-guide.js" defer></script>
  <script src="js/pwa.js" defer></script>
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar"></aside>

    <main class="main-content">
      <div class="page-inner details-page-inner">
        <!-- Backdrop hero (Netflix pop-up canvas backdrop) -->
        <div class="details-hero" id="details-hero">
          <button class="details-back-btn" id="back-btn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="details-playlist-btn" id="playlist-btn" aria-label="Add to playlist">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <div class="details-hero-skeleton skeleton" id="hero-skeleton"></div>
        </div>

        <!-- ═══════════════════════════════════════════════════
             NETFLIX POP-UP CANVAS LAYOUT
             Two-column split on desktop:
               LEFT  → Title, meta row (year • age rating • runtime),
                       Play button, tagline, full-paragraph synopsis.
               RIGHT → "Cast:", "Genres:", "This movie is:" stacked
                       vertically with muted #B3B3B3 labels.
             On mobile the columns stack (left first, then right).
             ═══════════════════════════════════════════════════ -->
        <div class="details-canvas">

          <!-- LEFT column: title + meta + synopsis -->
          <div class="details-canvas-left">
            <h1 class="details-title nf-title" id="details-title">Loading...</h1>

            <div class="details-meta" id="details-meta"></div>

            <div class="details-action-row">
              <a class="btn-play-nf details-watch-btn" id="watch-now-btn" href="#">
                <svg viewBox="0 0 24 24"><polygon points="6 4 20 12 6 20 6 4"/></svg>
                Play
              </a>
              <button class="details-save-btn" id="details-save-btn" aria-label="Save to playlist">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>My List</span>
              </button>
            </div>

            <!-- Anime badge — surfaced by details.js when isAnime(data)
                 is true. Tells the user that Sub/Dub is available on
                 the watch page. -->
            <div class="details-anime-badge" id="details-anime-badge" hidden>
              <span class="anime-badge-icon">🌸</span>
              <span class="anime-badge-text">
                <strong>Anime</strong> · Sub / Dub available via AniList
              </span>
            </div>

            <p class="details-tagline" id="details-tagline"></p>

            <div class="details-overview-section">
              <h3 class="details-section-title">Overview</h3>
              <p id="details-overview" class="details-overview-text">Loading...</p>
            </div>
          </div>

          <!-- RIGHT column: Cast / Genres / "This movie is:" -->
          <aside class="details-canvas-right">
            <div class="details-fact-block">
              <div class="details-fact-label">Cast:</div>
              <div class="details-fact-value" id="details-cast-summary">N/A</div>
            </div>

            <div class="details-fact-block">
              <div class="details-fact-label">Genres:</div>
              <div class="details-fact-value" id="details-genres-summary">N/A</div>
            </div>

            <div class="details-fact-block">
              <div class="details-fact-label">This movie is:</div>
              <div class="details-fact-value" id="details-mood-summary">N/A</div>
            </div>
          </aside>

        </div><!-- /details-canvas -->

        <!-- Episodes -->
        <section class="details-episodes-section" id="details-episodes-section" hidden>
          <div class="section-heading details-episodes-heading">
            <h3 class="details-section-title">Episodes</h3>
            <div class="section-label" id="episodes-summary-label">Season 1</div>
          </div>
          <div class="chip-row season-tabs" id="season-tabs"></div>
          <div class="episode-grid" id="episode-grid"></div>
        </section>

        <!-- Cast & Crew -->
        <div class="details-cast-section">
          <h3 class="details-section-title">Cast & Crew</h3>
          <div class="content-row-wrapper">
            <div class="content-row" id="details-cast-row"></div>
          </div>
        </div>

        <!-- Information -->
        <div class="details-info-section">
          <h3 class="details-section-title">Information</h3>
          <div class="details-info-list" id="details-info-list"></div>
        </div>

        <!-- Similar Titles -->
        <div class="details-similar-section">
          <h3 class="details-section-title">Similar Titles</h3>
          <div class="content-row-wrapper">
            <div class="content-row" id="details-similar-row"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <nav id="bottom-bar" class="bottom-bar"></nav>

  <div id="toast"></div>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/components.js"></script>
  <script src="js/details.js"></script>
</body>
</html>
