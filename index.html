<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ============================================================
         STREAMFLIX-0  |  github.com/Dev-Arnav-95/streamflix-0
         A private single-user streaming site.
         Stack: Vanilla JS · Firebase Auth · Firestore · TMDB API
    ============================================================ -->

    <title>Flash Gaming</title>

    <!-- Icons — swap with any icon library you prefer -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Firebase — keep these three, they are free CDN scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── Boot loader: shown while Firebase checks if you're already logged in ── -->
<div id="bootScreen">
    <span id="appNameEl">Flash Gaming</span>
    <div class="spinner"></div>
</div>

<!-- ── App ── -->
<div id="appScreen" class="screen">
    <header class="topbar">
        <div class="topbar-brand" id="topbarBrandEl">Flash Gaming</div>
        <nav class="topbar-nav">
            <button class="nav-btn active" data-view="home">Home</button>
            <button class="nav-btn" data-view="explore">Explore</button>
            <button class="nav-btn" data-view="trending">Trending</button>
            <button class="nav-btn" data-view="watchlist">Watchlist</button>
            <button class="nav-btn" data-view="history">History</button>
        </nav>
        <div class="topbar-search">
            <input type="text" id="searchInput" placeholder="Search movies, series…">
        </div>
        <div class="topbar-right">
            <span id="userName" style="color:var(--muted);font-size:.85rem;"></span>
            <button onclick="openSettings()">⚙ Settings</button>
        </div>
    </header>
    <div id="viewContainer"></div>
</div>

<!-- ── Player ── -->
<div id="playerModal">
    <div class="player-head">
        <h2 id="playerTitle">—</h2>
        <div class="player-controls">
            <button id="srv1Btn" onclick="setServer(1)">Server 1</button>
            <button id="srv2Btn" onclick="setServer(2)">Server 2</button>
            <select id="seasonPick" style="display:none;" onchange="loadEpisodes(state.currentMedia.id, this.value)"></select>
            <button class="close-btn" onclick="closePlayer()">✕ Close</button>
        </div>
    </div>
    <div class="player-body">
        <iframe id="streamFrame" allowfullscreen allow="autoplay; picture-in-picture; fullscreen"
            sandbox="allow-scripts allow-same-origin allow-presentation"
            referrerpolicy="no-referrer"></iframe>
        <div class="ep-panel" id="epPanel" style="display:none;">
            <div class="ep-panel-head">Episodes</div>
            <div class="ep-list" id="epList"></div>
        </div>
    </div>
</div>

<!-- ── Settings ── -->
<div id="settingsModal">
    <div class="settings-box">
        <h2>Settings</h2>
        <label>Display Name</label>
        <input type="text" id="inputName" placeholder="Your name">
        <label>Avatar Seed (changes your Dicebear avatar)</label>
        <input type="text" id="inputAvatar" placeholder="Any word">
        <div class="btn-row">
            <button class="btn-primary" style="border:none;" onclick="saveProfile()">Save</button>
            <button onclick="closeSettings()">Cancel</button>
        </div>
        <div class="btn-row" style="margin-top:8px;">
            <button onclick="resetData()" style="color:var(--muted);font-size:.82rem;">Clear Watchlist &amp; History</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script src="app.js"></script>
</body>
</html>
